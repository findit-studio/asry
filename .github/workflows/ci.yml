name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README'
      - 'COPYRIGHT'
      - 'LICENSE-*'
      - '**.md'
      - '**.txt'
  pull_request:
    paths-ignore:
      - 'README'
      - 'COPYRIGHT'
      - 'LICENSE-*'
      - '**.md'
      - '**.txt'
  workflow_dispatch:
  schedule: [cron: "0 1 */7 * *"]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  RUST_BACKTRACE: 1

jobs:
  # Check formatting (platform-independent, one OS is enough)
  rustfmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    # Nightly toolchain — `rustfmt.toml` uses
    # `imports_granularity = "Crate"`, an unstable feature only
    # available on nightly. Without this the stable rustfmt
    # silently drops the setting and reports diffs vs the
    # nightly-formatted tree.
    - name: Install Rust (nightly)
      run: rustup update nightly --no-self-update && rustup default nightly && rustup component add rustfmt --toolchain nightly
    - name: Check formatting
      run: cargo fmt --all -- --check

  # Apply clippy lints
  clippy:
    name: clippy
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
    - name: Install Rust
      # --no-self-update is necessary because the windows environment cannot self-update rustup.exe.
      run: rustup update stable --no-self-update && rustup default stable && rustup component add clippy
    - name: Apply clippy lints
      # Explicit feature combos — see build job for rationale.
      run: |
        set -e
        cargo clippy
        cargo clippy --features alignment
        cargo clippy --features alignment,serde
        cargo clippy --features alignment,whisperx-strict-tokenizer
        if [ "$RUNNER_OS" = "macOS" ]; then
          cargo clippy --features alignment,metal,coreml
        fi
      shell: bash

  # Run tests on some extra platforms
  # `cross`, `sanitizer`, `miri-sb`, `miri-tb` removed: they are
  # template defaults that don't fit whispery's architecture.
  # `Lang` is re-exported from `whispercpp` (gated on `runner`),
  # so even the "pure Rust" build path requires linking
  # whisper.cpp (cmake + C++) and — on the alignment path — ONNX
  # Runtime via load-dynamic. Neither dependency:
  #   * cross-compiles cleanly to the cross-job target list
  #     (wasm, i686, android, etc.) — `cmake + Foundation`
  #     framework lookups fail before we ever see whispery
  #     code,
  #   * is meaningfully sanitizable / miri-evaluable from
  #     downstream — any UB those tools would find lives in
  #     whisper.cpp / ORT, which test themselves upstream.
  # If a meaningful subset of pure-Rust code emerges later (e.g.
  # the SIMD normalizer kernels factored out from `runner`),
  # reintroduce a scoped job at that point.

  build:
    name: build
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
    - name: Cache cargo build and registry
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-build-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-build-
    - name: Install Rust
      # --no-self-update is necessary because the windows environment cannot self-update rustup.exe.
      run: rustup update stable --no-self-update && rustup default stable
    - name: Run build
      # Explicit feature combos rather than `cargo hack
      # --feature-powerset`: whispery's features aren't
      # orthogonal — `Lang` is re-exported from `whispercpp`
      # (gated on `runner`), so any combo without `runner`
      # fails to compile. Apple-only `metal` / `coreml` only
      # build on macOS; diagnostic toggles
      # (`parity-dump-emission`, `bench-internals`) ship
      # internals, never on the production surface.
      run: |
        set -e
        cargo build
        cargo build --features alignment
        cargo build --features alignment,serde
        cargo build --features alignment,whisperx-strict-tokenizer
        if [ "$RUNNER_OS" = "macOS" ]; then
          cargo build --features alignment,metal,coreml
        fi
      shell: bash

  test:
    name: test
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
    - name: Cache cargo build and registry
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-test-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-test-
    - name: Install Rust
      # --no-self-update is necessary because the windows environment cannot self-update rustup.exe.
      run: rustup update stable --no-self-update && rustup default stable
    # Audio parity fixtures (~283 MB of WAV + RTTM) live in the
    # sibling repo `Findit-AI/audio-fixtures`, NOT in whispery's
    # git history. The fetch is opt-in via
    # `WHISPERY_FETCH_FIXTURES=1` so the default `cargo test`
    # path stays network-free and fast. Tests that need the
    # fixtures gate themselves on the populated path
    # (`tests/parity/fixtures/<name>/clip_16k.wav`) and
    # short-circuit when absent.
    - name: Fetch audio parity fixtures
      if: env.WHISPERY_FETCH_FIXTURES == '1'
      shell: bash
      run: bash scripts/fetch_fixtures.sh
    - name: Run test
      # Explicit feature combos — see build job for rationale.
      run: |
        set -e
        cargo test
        cargo test --features alignment
        cargo test --features alignment,serde
        cargo test --features alignment,whisperx-strict-tokenizer
      shell: bash

  # valgrind:
  #   name: valgrind
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v6
  #     - name: Cache cargo build and registry
  #       uses: actions/cache@v5
  #       with:
  #         path: |
  #           ~/.cargo/registry
  #           ~/.cargo/git
  #           target
  #         key: ubuntu-latest-valgrind-${{ hashFiles('**/Cargo.lock') }}
  #         restore-keys: |
  #           ubuntu-latest-valgrind-
  #     - name: Install Rust
  #       run: rustup update stable && rustup default stable
  #     - name: Install Valgrind
  #       run: |
  #         sudo apt-get update -y
  #         sudo apt-get install -y valgrind
  #     # Uncomment and customize when you have binaries to test:
  #     # - name: cargo build foo
  #     #   run: cargo build --bin foo
  #     #   working-directory: integration
  #     # - name: Run valgrind foo
  #     #   run: valgrind --error-exitcode=1 --leak-check=full --show-leak-kinds=all ./target/debug/foo
  #     #   working-directory: integration

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    needs:
      - rustfmt
      - clippy
      - build
      - test
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        run: rustup update nightly && rustup default nightly
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin
      - name: Cache cargo build and registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-coverage-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-coverage-
      - name: Fetch audio parity fixtures
        if: env.WHISPERY_FETCH_FIXTURES == '1'
        shell: bash
        run: bash scripts/fetch_fixtures.sh
      - name: Run tarpaulin
        env:
          RUSTFLAGS: "--cfg tarpaulin"
        # Coverage runs Linux. `metal` / `coreml` need
        # Apple frameworks; diagnostic toggles ship internals.
        # Cover the full default-runner-and-alignment surface.
        run: cargo tarpaulin --features alignment,serde,whisperx-strict-tokenizer --run-types tests --run-types doctests --workspace --out xml
      - name: Upload to codecov.io
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: ${{ github.repository }}
          fail_ci_if_error: true
