codecov:
  require_ci_to_pass: false

ignore:
  # Quoted because `**` at the start of a YAML scalar reads as
  # an alias indicator (`*name`). Quoting keeps the glob.
  - "**/benches/*"
  - "**/examples/*"
  - "**/tests/*"

coverage:
  status:
    project: # Overall project status
      default:
        target: auto
        if_not_found: success
        only_pulls: false
    patch: # Status for the patch in pull requests
      default:
        target: auto
        if_not_found: success
        only_pulls: true
    changes: false # Whether to comment on the coverage changes in pull requests

comment:
  layout: "header, diff, files, footer"
  behavior: default
  require_changes: false
