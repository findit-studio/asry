[package]
name        = "whispery"
version     = "0.1.0"
edition     = "2024"
rust-version = "1.85"
license     = "MIT OR Apache-2.0"
description = "Sans-I/O cut/batch/whisper/align state machine for speech-to-text indexing pipelines"
repository  = "https://github.com/findit-studio/whispery"
readme      = "README.md"
keywords    = ["whisper", "asr", "speech-to-text", "indexing", "alignment"]
categories  = ["multimedia::audio", "science"]

[dependencies]
mediatime = { version = "0.1.5", default-features = false }
smol_str  = { version = "0.3", default-features = false }
thiserror = { version = "2", default-features = false }
smallvec  = { version = "1", default-features = false }

# Optional features (Plan A scope only).
serde      = { version = "1", optional = true, default-features = false, features = ["derive", "alloc"] }
arbitrary  = { version = "1", optional = true, features = ["derive"] }
quickcheck = { version = "1", optional = true, default-features = false }

[dev-dependencies]
criterion = { version = "0.8", default-features = false, features = ["html_reports"] }
smol_str  = "0.3"
tempfile  = "3"

[features]
default  = ["std"]
std      = ["mediatime/std", "smol_str/std", "serde?/std"]
# Explicit `serde` feature: enables the optional dep AND forwards
# serde to smol_str + mediatime so derives on public types
# (Transcript, Word, ChunkId, VadSegment, Lang) actually compile.
# Codex round-2 finding: previously the implicit "feature from
# optional=true" form left smol_str/serde and mediatime/serde
# unactivated, breaking any downstream that enabled
# `whispery/serde`.
serde     = ["dep:serde", "smol_str/serde", "mediatime/serde"]
# Stubs for Plan B / Plan C. Declared here so cfg(feature = "...")
# branches in Plan A code don't emit `unexpected_cfg` warnings; the
# features pull no deps and gate no behaviour until Plan B/C land.
runner    = []
alignment = ["runner"]

[lib]
name = "whispery"
path = "src/lib.rs"

[[example]]
name = "core_only"
path = "examples/core_only.rs"

[[bench]]
name    = "cut"
path    = "benches/cut.rs"
harness = false

[[bench]]
name    = "dispatch"
path    = "benches/dispatch.rs"
harness = false
